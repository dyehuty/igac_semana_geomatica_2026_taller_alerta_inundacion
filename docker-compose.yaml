name: frost_allinone
services:
  web:
    # platform: linux/amd64
    image: fraunhoferiosb/frost-server:latest
    environment:
      # For all settings see: https://fraunhoferiosb.github.io/FROST-Server/settings/settings.html
      - serviceRootUrl=http://localhost:8080/FROST-Server
      - plugins_modelLoader_enable=true
      - plugins_multiDatastream_enable=false
      - plugins_actuation_enable=false
      - http_cors_enable=true
      - http_cors_allowed_origins=*
      - persistence_db_driver=org.postgresql.Driver
      - persistence_db_url=jdbc:postgresql://database:5432/sensorthings
      - persistence_db_username=sensorthings
      - persistence_db_password=ChangeMe
      - persistence_autoUpdateDatabase=true
      - TZ=America/Bogota
    ports:
      - 8080:8080
      - 1883:1883
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error http://localhost:8080/FROST-Server/v1.1 > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  database:
    # platform: linux/amd64
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_DB=sensorthings
      - POSTGRES_USER=sensorthings
      - POSTGRES_PASSWORD=ChangeMe
      - TZ=America/Bogota
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d sensorthings -U sensorthings "]
      interval: 2s
      timeout: 2s
      retries: 10

  simulator:
    build:
      context: ./simulator
    environment:
      FROST_URL: http://web:8080/FROST-Server/v1.1
      PORT: 3002
      STATION_COUNT: 22
      BASE_TICK_MS: 10000
      STORM_DURATION_MS: 120000
      RAIN_THRESHOLD: 50
      LOG_LEVEL: info
    ports:
      - 3002:3002
    depends_on:
      database:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    environment:
      FROST_URL: http://web:8080/FROST-Server/v1.1
      FROST_MQTT_URL: mqtt://web:1883
      PORT: 3001
      WS_PATH: /ws
      MQTT_CLIENT_ID: frost-visualization-gateway
      CATALOG_REFRESH_MS: 30000
      LOG_LEVEL: info
    ports:
      - 3001:3001
    depends_on:
      database:
        condition: service_healthy
      web:
        condition: service_healthy
      simulator:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
    postgis_volume:
