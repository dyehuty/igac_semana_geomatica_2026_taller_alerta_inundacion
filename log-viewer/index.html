<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Visor de log · Gateway FROST</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #0f172a; color: #e2e8f0; font-size: 13px;
    }
    header {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 10px 14px; background: #1e293b; border-bottom: 1px solid #334155;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: #64748b; flex: none; }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: .3; } }
    header .url { color: #94a3b8; }
    header .grow { flex: 1; }
    header .count { color: #cbd5e1; }
    header input[type=text] {
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
      border-radius: 6px; padding: 5px 8px; font: inherit; width: 180px;
    }
    header label { color: #94a3b8; display: inline-flex; align-items: center; gap: 5px; }
    button {
      background: #334155; color: #e2e8f0; border: 0; border-radius: 6px;
      padding: 6px 12px; font: inherit; cursor: pointer;
    }
    button:hover { background: #475569; }
    #log { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .line { display: flex; gap: 10px; padding: 2px 0; border-bottom: 1px solid #1e293b22; white-space: nowrap; }
    .line .t { color: #64748b; flex: none; }
    .line .tag { flex: none; width: 118px; font-weight: 600; }
    .line .msg { color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; }
    .tag.observation { color: #38bdf8; }
    .tag.thing { color: #22c55e; }
    .tag.snapshot { color: #a78bfa; }
    .tag.ctrl { color: #64748b; }
    .tag.error { color: #ef4444; }
    .msg b { color: #f8fafc; }
    .msg .u { color: #94a3b8; }
    .empty { color: #64748b; padding: 20px; }
  </style>
</head>
<body>
  <header>
    <span id="dot" class="dot"></span>
    <span id="state">conectando…</span>
    <span class="url" id="url"></span>
    <span class="grow"></span>
    <span class="count"><b id="count">0</b> msgs</span>
    <input id="filter" type="text" placeholder="filtrar texto…" />
    <label><input id="autoscroll" type="checkbox" checked /> auto-scroll</label>
    <button id="reconnect">Reconectar</button>
    <button id="clear">Limpiar</button>
  </header>
  <div id="log"><div class="empty">Esperando datos del gateway…</div></div>

  <script>
    // ---- Config editable ----
    const WS_URL = "ws://localhost:3001/ws";
    // Filtro opcional. null = todos (recibe el snapshot automático al conectar).
    // Ej: { thingTypes: ["weather-station"] }  o  { thingIds: [15] }
    const SUBSCRIBE = null;
    const MAX_LINES = 500;
    // -------------------------

    const $ = (id) => document.getElementById(id);
    $("url").textContent = WS_URL;
    const logEl = $("log");
    let ws = null, count = 0, manualClose = false;

    function setState(on) {
      $("dot").className = "dot " + (on ? "on" : "off");
      $("state").textContent = on ? "conectado" : "desconectado";
    }

    function fmtVal(v, unit) {
      const val = typeof v === "number" ? v : JSON.stringify(v);
      return `<b>${val}</b>${unit ? ` <span class="u">${unit}</span>` : ""}`;
    }

    function describe(m) {
      switch (m.type) {
        case "welcome": return ["ctrl", "welcome", "conexión establecida"];
        case "pong":    return ["ctrl", "pong", ""];
        case "error":   return ["error", "error", m.message || ""];
        case "snapshot": {
          const names = (m.things || []).map((t) => t.name).slice(0, 6).join(", ");
          return ["snapshot", "snapshot", `${(m.things || []).length} things — ${names}${(m.things||[]).length > 6 ? "…" : ""}`];
        }
        case "observation": {
          const d = m.data || {};
          return ["observation", "observation", `${d.thingName} · ${d.observedProperty} = ${fmtVal(d.value, d.unitSymbol)}`];
        }
        case "thing.updated": {
          const t = m.thing || {};
          const metrics = Object.values(t.metrics || {});
          const last = metrics.sort((a, b) => (a.phenomenonTime < b.phenomenonTime ? 1 : -1))[0];
          const lastTxt = last ? `última: ${last.observedProperty} = ${fmtVal(last.value, last.unitSymbol)}` : "sin métricas";
          return ["thing", "thing.updated", `${t.name} (${t.type}) · ${metrics.length} métricas · ${lastTxt}`];
        }
        default: return ["ctrl", m.type || "?", ""];
      }
    }

    function append(m) {
      const [cls, tag, msg] = describe(m);
      const empty = logEl.querySelector(".empty");
      if (empty) empty.remove();

      const line = document.createElement("div");
      line.className = "line";
      const time = new Date().toLocaleTimeString("es-CO", { hour12: false }) + "." + String(Date.now() % 1000).padStart(3, "0");
      line.innerHTML = `<span class="t">${time}</span><span class="tag ${cls}">${tag}</span><span class="msg">${msg}</span>`;
      line.title = JSON.stringify(m, null, 2);
      line.dataset.text = (tag + " " + msg + " " + line.title).toLowerCase();

      const f = $("filter").value.trim().toLowerCase();
      if (f && !line.dataset.text.includes(f)) line.style.display = "none";

      logEl.appendChild(line);
      while (logEl.children.length > MAX_LINES) logEl.removeChild(logEl.firstChild);

      count += 1;
      $("count").textContent = count;
      if ($("autoscroll").checked) logEl.scrollTop = logEl.scrollHeight;
    }

    function connect() {
      manualClose = false;
      ws = new WebSocket(WS_URL);
      ws.onopen = () => {
        setState(true);
        if (SUBSCRIBE) ws.send(JSON.stringify({ action: "subscribe", filter: SUBSCRIBE }));
      };
      ws.onmessage = (ev) => {
        try { append(JSON.parse(ev.data)); }
        catch { append({ type: "error", message: "frame no-JSON: " + ev.data }); }
      };
      ws.onclose = () => {
        setState(false);
        if (!manualClose) setTimeout(connect, 2000);
      };
      ws.onerror = () => setState(false);
    }

    $("reconnect").addEventListener("click", () => {
      manualClose = true;
      if (ws) ws.close();
      setTimeout(connect, 100);
    });
    $("clear").addEventListener("click", () => {
      logEl.innerHTML = '<div class="empty">Log limpiado.</div>';
      count = 0; $("count").textContent = "0";
    });
    $("filter").addEventListener("input", () => {
      const f = $("filter").value.trim().toLowerCase();
      for (const line of logEl.querySelectorAll(".line")) {
        line.style.display = !f || line.dataset.text.includes(f) ? "" : "none";
      }
    });

    connect();
  </script>
</body>
</html>
